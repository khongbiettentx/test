function diamond(x,y,w,h,cls,extraCls){
  const hw=w/2,hh=h/2;
  const pts=`${x},${y-hh} ${x+hw},${y} ${x},${y+hh} ${x-hw},${y}`;
  let path=`<polygon points="${pts}" class="${cls}"`;
  if(extraCls) path+=` style="stroke-width:2.5"`;
  path+=`/>`;
  if(extraCls){
    const s=8,pts2=`${x},${y-hh-s} ${x+hw+s},${y} ${x},${y+hh+s} ${x-hw-s},${y}`;
    path=`<polygon points="${pts2}" class="rel-fill" style="fill:none;stroke:#C55A11;stroke-width:1.5"/>`+path;
  }
  return path;
}

function ellipse(x,y,rx,ry,cls,double_,dashed){
  let el='';
  if(double_) el+=`<ellipse cx="${x}" cy="${y}" rx="${rx+7}" ry="${ry+5}" class="${cls}" style="fill:none"/>`;
  el+=`<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" class="${cls}"${dashed?' style="stroke-dasharray:4 3"':''}/>`;
  return el;
}

function renderDiagram(key){
  const d=diagrams[key];
  if(!d) return;
  const svg=document.getElementById('ersvg');
  svg.setAttribute('viewBox',d.vb);
  let html='<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';

  // attr connection lines
  d.attrs.forEach(a=>{
    const tx=a.tx||0,ty=a.ty||0;
    html+=`<line x1="${a.x}" y1="${a.y}" x2="${tx}" y2="${ty}" class="conn" opacity="0.5"/>`;
  });

  // rel connection lines + cardinality
  d.rels.forEach(r=>{
    r.conns.forEach(c=>{
      const ex=c.cx2,ey=c.cy2;
      html+=`<line x1="${c.cx1}" y1="${c.cy1}" x2="${ex}" y2="${ey}" class="conn"/>`;
      if(c.card){
        const mx=c.cx1+(c.cx2-c.cx1)*0.7, my=c.cy1+(c.cy2-c.cy1)*0.7;
        html+=`<text class="card" x="${mx}" y="${my}">${c.card}</text>`;
      }
    });
  });

  // entities
  d.entities.forEach(e=>{
    const w=110,h=36;
    const rx=e.x-w/2,ry=e.y-h/2;
    if(e.weak){
      html+=`<rect x="${rx-5}" y="${ry-5}" width="${w+10}" height="${h+10}" rx="6" class="weak-outer"/>`;
      html+=`<rect x="${rx}" y="${ry}" width="${w}" height="${h}" rx="4" class="weak-rect"/>`;
    } else {
      html+=`<rect x="${rx}" y="${ry}" width="${w}" height="${h}" rx="4" class="ent-rect"/>`;
    }
    html+=`<text class="ent-text" x="${e.x}" y="${e.y}">${e.label}</text>`;
  });

  // relationships
  d.rels.forEach(r=>{
    html+=diamond(r.x,r.y,80,36,'rel-fill',r.weak);
    html+=`<text class="rel-text" x="${r.x}" y="${r.y}">${r.label}</text>`;
  });

  // attributes
  d.attrs.forEach(a=>{
    const rx=22,ry=13;
    const cls=a.key?'key-fill':(a.multi?'multi-fill':'attr-fill');
    html+=ellipse(a.x,a.y,rx,ry,cls,a.multi,a.derived);
    if(a.key){
      html+=`<text class="attr-text" x="${a.x}" y="${a.y}" style="text-decoration:underline">${a.label}</text>`;
    } else {
      html+=`<text class="attr-text" x="${a.x}" y="${a.y}">${a.label}</text>`;
    }
  });

  svg.innerHTML=html;
}

// Build tabs
const tabsEl=document.getElementById('tabs');
const keys=Object.keys(diagrams);
keys.forEach((k,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' active':'');
  btn.textContent=k;
  btn.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    renderDiagram(k);
  };
  tabsEl.appendChild(btn);
});
renderDiagram(keys[0]);
</script>
